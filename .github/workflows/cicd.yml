name: Build and Push to ECR

on:
  push:
    # pull_requests:
    #     branches: ['main', 'dev']
    branches: ["main"]

# Declaring the Jobs to be run in the workflow
jobs:
  build_scan: #
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest

    steps: #Where we start to declare the steps to be run in the job.
      - name: Checkout Code
        uses: actions/checkout@v7 # Code that tells the workflow to checkout(downloading and cloning ) the code from the repository.

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          severity: CRITICAL,HIGH
          exit-code: 1

      # Onother step
      - name: Build Docker Image
        run: docker build -t 995603457526.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .

        #After building the docker image we now need to scan the image for vulnerabilities using Trivy.
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 995603457526.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
          format: table
          scan-type: "image"
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

        # After scanning the docker image we now need to push the imaage to AWS ECR. Before we can push the image to ECR we need to login to ECR using the AWS CLI.
      - name: push Image to ECR
        run: echo"pushing image to ECR"
