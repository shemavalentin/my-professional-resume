name: Build and Push to ECR

on:
  push:
    # Pull_request:
    #     branches: ['main', 'dev']
    branches: ["main"]

jobs:
  build_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          format: "HIGH, CRITICAL"
          exit-code: "1"

      - name: Build Docker image
        run: docker build -t 995603457526.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0
        with:
          image-ref: 995603457526.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push Image to ECR
        run: echo "Pushing image to ECR"
